name: docker-build

on:
  workflow_dispatch:

env:
  DOCKERHUB_REPO: giterhub/darkhttpd

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      NTFY_URL: ${{ secrets.NTFY_URL }}
      NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Clone Repository
        uses: GuillaumeFalourd/clone-github-repo-action@v2
        with:
          owner: 'emikulic'
          repository: 'darkhttpd'
      - name: Get latest release tag
        uses: dragonish/get-latest-release-tag@v1
        id: latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: 'emikulic/darkhttpd'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DeckerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./darkhttpd
          file: ./darkhttpd/Dockerfile
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ steps.latest.outputs.tag }}
          platforms: |
            linux/amd64
            linux/386
            linux/arm64
            linux/arm/v7
      - name: Send notification
        if: ${{ !cancelled() && env.NTFY_URL != '' && env.NTFY_TOKEN != '' && env.NTFY_TOPIC != '' }}
        uses: dragonish/send-to-ntfy@v1
        with:
          base-url: ${{ secrets.NTFY_URL }}
          topic: ${{ secrets.NTFY_TOPIC }}
          access-token: ${{ secrets.NTFY_TOKEN }}
          title: ${{ github.repository }}
          message: "Build ${{ env.DOCKERHUB_REPO }}:${{ steps.latest.outputs.tag }}"
          tags: "GitHub,Docker,building_construction,${{ job.status }}"
          priority: 2
          actions: '[{"action": "view", "label": "View GitHub", "url": "https://github.com/${{ github.repository }}"}, {"action": "view", "label": "View Docker Hub", "url": "https://hub.docker.com/r/${{ env.DOCKERHUB_REPO }}"}]'
